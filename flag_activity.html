<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Review - Flag Activity</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #7375e9, #89cff0);
        }
        .container {
            text-align: center;
            background-color: white;
            border-radius: 10px;
            padding: 20px 40px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        h1 {
            color: #4a4ae6;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .button {
            background-color: #4a4ae6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }
        .button:hover {
            background-color: #3737c7;
        }
        .info {
            color: #555;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Admin Review - Flag Activity</h1>
        <p class="info">Flag late arrivals, early departures, or insufficient work hours.</p>
        
        <button class="button" onclick="flagLate()">Flag Late Arrivals</button>
        <button class="button" onclick="flagEarly()">Flag Early Departures</button>
        <button class="button" onclick="flagInsufficient()">Flag Insufficient Hours</button>
    </div>

    <script>
        function flagLate() {
            alert("Flagging late arrivals...");
        }
        function flagEarly() {
            alert("Flagging early departures...");
        }
        function flagInsufficient() {
            alert("Flagging insufficient work hours...");
        }
    </script>

</body>
</html>
