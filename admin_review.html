<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Review</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #7375e9, #89cff0);
        }
        .container {
            text-align: center;
            background-color: white;
            border-radius: 10px;
            padding: 30px 40px;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1);
            max-width: 350px;
        }
        h1 {
            color: #4a4ae6;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .button {
            background-color: #4a4ae6;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            text-decoration: none;
            text-align: center;
            margin-bottom: 15px;
            transition: background 0.3s ease;
            display: inline-block;
        }
        .button:hover {
            background-color: #3737c7;
        }
        .info {
            color: #555;
            margin-bottom: 20px;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Admin Review</h1>
        <p class="info">Choose an option below to proceed:</p>
        
        <div class="button-container">
            <a href="view_logs.html" class="button">View Logs</a>
            <a href="flag_activity.html" class="button">Flag Employee Activity</a>
            <a href="export_data.html" class="button">Export Data</a>
        </div>
    </div>

</body>
</html>
